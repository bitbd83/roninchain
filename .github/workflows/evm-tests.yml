name: EVM Test 

on:
  push:
    branches: 
      - main

  pull_request:
    branches: 
      - main

jobs:
  state-test:
    name: Run EVM Tests
    strategy:
      matrix:
        go-version: [1.22.x]
        os: [ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
    - name: Install Go
      uses: actions/setup-go@v3
      with:
        go-version: ${{ matrix.go-version }}
        
    - name: Checkout code
      uses: actions/checkout@v3

    - uses: actions/cache@v3
      with:
        path: |
          ~/go/pkg/mod
          ~/.cache/go-build
          ~/Library/Caches/go-build
          ~\AppData\Local\go-build
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-

    - name: Install dependencies
      run: go mod download

    - name: Make test script executable
      run: chmod +x tests/run-evm-tests.sh

    - name: Download spec-tests fixtures
      run: |
        cd tests && bash -x download-fixtures.sh

    - name: Run EVM Tests
      env:
        CGO_CFLAGS: "-O -D__BLST_PORTABLE__"
        CGO_CFLAGS_ALLOW: "-O -D__BLST_PORTABLE__"
        ANDROID_HOME: "" # Skip android test
      run: |
        cd tests && bash -x run-evm-tests.sh 