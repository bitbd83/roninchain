name: Shadow Fork Build

on:
  # Release workflow build for release candidate version
  release:
    types: [published]
    tags:
      - v*.*.*-rc*

env:
  REGISTRY: ghcr.io
  IMAGE_REPOSITORY: ronin-chain/ronin
  DOCKER_FILE: Dockerfile
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Go
        uses: actions/setup-go@v3
        with:
          go-version: '1.22.10'

      - name: Apply shadow fork patch
        run: |
          git apply script/shadow_fork.patch

      - name: Log in to the Container registry
        uses: docker/login-action@f054a8b539a109f9f41c372932f1ae047eff08c9
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Enable Registry Cache
      - name: "Set up Docker Buildx"
        uses: "docker/setup-buildx-action@8c0edbc76e98fa90f69d9a2c020dcb50019dc325" #v2.2.1
      
      - name: Set tag name
        id: vars
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            echo "tag=${{ github.event.release.name }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
          fi

      - name: Build and push Docker image
        uses: docker/build-push-action@37abcedcc1da61a57767b7588cb9d03eb57e28b3 #v3.3.0
        with:
          context: .
          file: ${{ env.DOCKER_FILE }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_REPOSITORY }}:shadow-fork-${{ steps.vars.outputs.tag }}
          labels: |
            shadow-fork-${{ steps.vars.outputs.tag }}
