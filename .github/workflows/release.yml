name: release
on:
  release:
    types: [published]
    tags:
      - v*.*.*

env:
  REGISTRY: ghcr.io
  IMAGE_REPOSITORY: bitbd83/roninchain
  DOCKER_FILE: Dockerfile
jobs:
  push_to_docker_registry:
    name: Push Docker image to GHCR.IO
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: 'Checkout Repo'
        run: |
          git clone https://github.com/${{ github.repository }}.git .
          git checkout ${{ github.sha }}

      - name: Log in to the Container registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        run: |
          # Extract version from tag (e.g., v1.2.3 -> 1.2.3)
          VERSION=${GITHUB_REF#refs/tags/v}
          SHORT_SHA=${GITHUB_SHA::7}
          
          # Generate tags
          TAGS="${{ env.REGISTRY }}/${{ env.IMAGE_REPOSITORY }}:${VERSION}-${SHORT_SHA}"
          TAGS="${TAGS},${{ env.REGISTRY }}/${{ env.IMAGE_REPOSITORY }}:${VERSION}"
          TAGS="${TAGS},${{ env.REGISTRY }}/${{ env.IMAGE_REPOSITORY }}:latest"
          
          # Generate labels
          LABELS="org.opencontainers.image.created=$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          LABELS="${LABELS},org.opencontainers.image.source=https://github.com/${{ github.repository }}"
          LABELS="${LABELS},org.opencontainers.image.version=${VERSION}"
          LABELS="${LABELS},org.opencontainers.image.revision=${{ github.sha }}"
          
          echo "tags=${TAGS}" >> $GITHUB_OUTPUT
          echo "labels=${LABELS}" >> $GITHUB_OUTPUT
          
      # Enable Registry Cache
      - name: "Set up Docker Buildx"
        run: |
          docker buildx create --name mybuilder --use --bootstrap
          docker buildx inspect

      - name: Build and push Docker image
        run: |
          docker buildx build \
            --file ${{ env.DOCKER_FILE }} \
            --platform linux/amd64,linux/arm64 \
            --tag $(echo "${{ steps.meta.outputs.tags }}" | tr ',' ' --tag ') \
            --label $(echo "${{ steps.meta.outputs.labels }}" | tr ',' ' --label ') \
            --push \
            .
